<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>DWPMS Maintenance App</title>

    <!-- CSS -->
    <link rel="stylesheet"
          href="css/style.css">

    <!-- SUPABASE -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

</head>

<body>

    <!-- LOGIN SCREEN -->
    <div id="loginScreen"
         class="login">

        <div class="login__card">

            <div class="login__title">
                DWPMS Login
            </div>
        <form onsubmit="loginUser(); return false;">
            <input type="text"
                   id="loginUsernameInput"
                   class="login__input"
                   placeholder="Username">

            <input type="password"
                   id="loginPasswordInput"
                   class="login__input"
                   placeholder="Password">

            <button type="submit"
                   class="login__button">

                Login

            </button>

            </form>

        </div>

    </div>

    <!-- DASHBOARD -->
    <div id="dashboardScreen"
         class="dashboard hidden">

        <!-- HEADER -->
        <div class="dashboard__header">

             <div class="header-left">
        <img src="images/dwlogo.svg" alt="dwlogo" class="logo">

             <span class="header-title">
            Preventive Maintenance Schedule
        </span>
    </div>
            <div class="header-right">
    <img src="images/nsoftlogo.svg" alt="nsoftlogo" class="logo">
    </div>

        </div>

        <div class="dashboard__container">

            <!-- STATS -->
            <div class="dashboard__container">

    <!-- STATS -->
    <div class="dashboard__stats-grid">

        <!-- TOTAL PLANNED -->
        <div class="dashboard__stat-card">

            <h2>Total Planned</h2>

            <p id="dashboardPlannedCount">
                0
            </p>

        </div>

        <!-- TOTAL SCHEDULED -->
        <div class="dashboard__stat-card">

            <h2>Total Scheduled</h2>

            <p id="dashboardScheduledCount">
                0
            </p>

        </div>

        <!-- PENDING -->
        <div class="dashboard__stat-card">

            <h2>Pending</h2>

            <p id="dashboardPendingCount">
                0
            </p>

        </div>

        <!-- COMPLETED -->
        <div class="dashboard__stat-card">

            <h2>Completed</h2>

            <p id="dashboardCompletedCount">
                0
            </p>

        </div>

    </div>

            <!-- FILTERS -->
            <div class="dashboard__filter-card">

   <button class="dashboard__filter-button"
            onclick="loadTasks('weekPending')">

        This Week Pending

    </button>

    <button class="dashboard__filter-button"
            onclick="loadTasks('allPending')">

        All Pending

    </button>

    <button class="dashboard__filter-button"
            onclick="loadTasks('all')">

        All Tasks

    </button>



    </div>
<!-- TASK LIST -->
            <div id="dashboardTaskList">

            </div>

        </div>


    <!-- JS -->
    <script src="js/app.js"></script>

</body>

</html>
