<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>DWPMS Maintenance App</title>

    <!-- CSS -->
    <link rel="stylesheet"
          href="css/style.css">

    <!-- SUPABASE -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <script src="js/app.js"></script>

</head>

<body>

    <!-- LOGIN SCREEN -->
    <div id="loginScreen"
         class="login">

        <div class="login__card">

            <div class="login__title">
                DWPMS Login
            </div>
        <form onsubmit="loginUser(); return false;">
            <input type="text"
                   id="loginUsernameInput"
                   class="login__input"
                   placeholder="Email">

            <input type="password"
                   id="loginPasswordInput"
                   class="login__input"
                   placeholder="Password">

            <button type="submit"
                   class="login__button">

                Login

            </button>

            </form>

        </div>

    </div>
   

  <!-- DASHBOARD -->
<div id="dashboardScreen" class="dashboard hidden">

    <!-- HEADER -->
    <div class="dashboard__header">
        <div class="header-top">
            <span class="header-title">Preventive Maintenance Schedule</span>
        </div>
        <div class="header-bottom">
            <div class="header-left">
                <img class="logo-DW" src="images/dwlogo.svg">
            </div>
            <div class="header-right">
                <div class="logged-user">
                    <span id="loggedUserName"></span>
                </div>
                <button class="logout-button" onclick="logoutUser()">Logout</button>
                <img src="images/nsoftlogo.svg" alt="nsoftlogo" class="logo">
            </div>
        </div>
    </div>

    <!-- TABS -->
    <div class="dashboard__tabs">
        <button class="dashboard__tab active" onclick="switchTab('plan', this)">Plan</button>
        <button class="dashboard__tab" onclick="switchTab('Actual', this)">Actual</button>
         <button class="dashboard__tab" onclick="switchTab('dashboard', this)">Dashboard</button>
    </div>

    <!-- TAB: PLAN -->
    <div id="tab-plan" class="dashboard__tab-content hidden">
        <!-- plan content goes here later -->
<div class="plan__container">

        <!-- FORM CARD -->
        <div class="plan__card">

            <div class="plan__card-title">Create Maintenance Plan</div>

            <!-- ROW 1 -->
            <div class="plan__row">

          <div class="plan__field">
                <label class="plan__label">Machine Type</label>
                <select id="planMachineType" class="plan__input" onchange="onMachineTypeChange()">
                    <option value="">Select Machine Type</option>
                </select>
            </div>

            <div class="plan__field">
                <label class="plan__label">Machine ID</label>
                <select id="planMachineId" class="plan__input">
                    <option value="">Select Machine ID</option>
                </select>
                </div>

            </div>

            <!-- ROW 2 -->
            <div class="plan__row">

                <div class="plan__field">
                    <label class="plan__label">Start Date</label>
                    <input type="date" id="planStartDate" class="plan__input">
                </div>

                <div class="plan__field">
                    <label class="plan__label">End Date</label>
                    <input type="date" id="planEndDate" class="plan__input">
                </div>

            </div>

            <!-- ROW 3 -->
            <div class="plan__row">

                <div class="plan__field">
                    <label class="plan__label">Frequency (months)</label>
                    <select id="planFrequency" class="plan__input">
                        <option value="1">1 Month</option>
                        <option value="2">2 Months</option>
                        <option value="3">3 Months</option>
                    </select>
                </div>

                <div class="plan__field">
                    <label class="plan__label">Status</label>
                    <select id="planStatus" class="plan__input">
                        <option value="Planned">Planned</option>
                        <option value="Scheduled">Scheduled</option>
                    </select>
                </div>

            </div>

            <!-- PREVIEW -->
            <div id="planPreview" class="plan__preview hidden"></div>

            <!-- CONFIRM BOX -->
            <div id="planConfirmBox" class="hidden"></div>


            <!-- BUTTONS -->
            <div class="plan__actions">
                <button class="plan__btn-ghost" onclick="previewAndConfirm()">Preview</button>
                <!--<button class="plan__btn-primary" onclick="saveSchedule()">Save to Database</button>-->
            </div>

            <!-- MESSAGE -->
            <div id="planMessage" class="plan__message hidden"></div>
     </div>

     

            <!-- GANTT GRID -->
<div class="plan-grid__wrap">
    <div class="plan-grid__scroll">
        <table class="plan-grid__table" id="planGanttTable">
            <thead id="planGanttHead"></thead>
            <tbody id="planGanttBody"></tbody>
        </table>
    </div>
</div>

<!-- TOOLTIP -->
<div id="planTooltip" class="plan-grid__tooltip hidden"></div>

      </div>


    </div> 


    <!-- TAB: DASHBOARD Actual  -->
<div id="tab-Actual" class="dashboard__tab-content hidden">

        <!-- Actual tab CONTAINER -->
        <div class="dashboard__container">

            <!-- STATS -->
            <div class="dashboard__stats-grid">
                <div class="dashboard__stat-card">
                    <h2>Total Planned</h2>
                    <p id="dashboardPlannedCount">0</p>
                </div>
                <div class="dashboard__stat-card">
                    <h2>Total Scheduled</h2>
                    <p id="dashboardScheduledCount">0</p>
                </div>
                <div class="dashboard__stat-card">
                    <h2>Pending</h2>
                    <p id="dashboardPendingCount">0</p>
                </div>
                <div class="dashboard__stat-card">
                    <h2>Completed</h2>
                    <p id="dashboardCompletedCount">0</p>
                </div>
            </div>

            <!-- FILTERS -->
            <div class="dashboard__filter-card">
                <button class="dashboard__filter-button" onclick="loadTasks('weekPending', this)">This Week Pending</button>
                <button class="dashboard__filter-button" onclick="loadTasks('allPending', this)">All Pending</button>
                <button class="dashboard__filter-button" onclick="loadTasks('all', this)">All Tasks</button>
            </div>

            <button class="dashboard__filter-button"
        onclick="loadTasks('allPending', this)">

            All Pending

                </button>

                <button class="dashboard__filter-button"
                        onclick="loadTasks('all', this)">

                    All Tasks

                </button>

                <!-- CHECKLIST SCREEN -->
            <div id="checklistScreen"
            class="checklist-screen hidden">

     
    <!-- TOP BAR -->
    <div class="checklist-topbar">

        <button class="back-button"
                onclick="backToTasks()">

            ← Back

        </button>

        <div class="checklist-title">

            Maintenance Checklist

        </div>

    </div>

    <!-- CHECKLIST ITEMS -->
    <div id="checklistContainer"
         class="checklist-container">

    </div>

    <!-- BOTTOM ACTION BAR -->
    <div class="checklist-bottom-bar">

        <button class="save-button"
                onclick="saveChecklist()">

            Save Checklist

        </button>

    </div>

</div>

<div id="taskListScreen">

    <div id="dashboardTaskList"></div>

</div>


<!-- TASK LIST -->
            <div id="dashboardTaskList">

            </div>

        </div>

                </div>

        </div>

    </div>

</div>

<!-- TAB: DASHBOARD -->
<div id="tab-dashboard" class="dashboard__tab-content hidden">
    <div class="dash__container">

        <div class="dash__grid">

            <div class="dash__card">
                <div class="dash__label">Total Planned</div>
                <div class="dash__number" id="dashTotal">0</div>
            </div>

            <div class="dash__card">
                <div class="dash__label">Scheduled</div>
                <div class="dash__number" id="dashScheduled">0</div>
            </div>

            <div class="dash__card">
                <div class="dash__label">Pending</div>
                <div class="dash__number dash__number--pending" id="dashPending">0</div>
            </div>

            <div class="dash__card">
                <div class="dash__label">Completed</div>
                <div class="dash__number dash__number--completed" id="dashCompleted">0</div>
            </div>

            <div class="dash__card">
                <div class="dash__label">Overdue</div>
                <div class="dash__number dash__number--overdue" id="dashOverdue">0</div>
            </div>

        </div>

    </div>
</div>



    <!-- JS -->
    <script src="js/app.js"></script>

</body>

</html>
